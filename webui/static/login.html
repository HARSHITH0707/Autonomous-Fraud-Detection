<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Fraud Shield Console</title>
  <link rel="stylesheet" href="/static/dashboard.css" />
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at top left, rgba(244, 192, 149, 0.2), transparent 30%),
                  linear-gradient(140deg, #171410, #1c1814 100%);
    }
    .login-card {
      width: 100%;
      max-width: 420px;
      padding: 40px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 32px;
      background: rgba(255, 251, 244, 0.03);
      backdrop-filter: blur(20px);
      box-shadow: 0 40px 100px rgba(0,0,0,0.5);
      text-align: center;
    }
    .login-card h1 {
      font-size: 2.4rem;
      margin-bottom: 8px;
      color: #fff;
    }
    .login-card p {
      color: rgba(255, 255, 255, 0.5);
      margin-bottom: 32px;
    }
    .login-form {
      display: grid;
      gap: 16px;
    }
    .login-form input {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #fff;
    }
    .login-form input::placeholder {
      color: rgba(255, 255, 255, 0.2);
    }
    .social-login {
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }
    .btn-google {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      background: #fff;
      color: #000;
      font-weight: 600;
    }
    .error-msg {
      color: #ff4444;
      font-size: 0.9rem;
      margin-top: 16px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <p class="eyebrow">Enterprise Security</p>
    <h1>Fraud Shield</h1>
    <p>Sign in to access the multi-agent detection console.</p>
    
    <form id="login-form" class="login-form">
      <input type="email" id="email" placeholder="Email Address" required />
      <input type="password" id="password" placeholder="Password" required />
      <button type="submit" class="primary">Sign In</button>
    </form>
    
    <div class="social-login">
      <button id="google-login" class="btn-google">
        <svg width="18" height="18" viewBox="0 0 18 18"><path d="M17.64 9.2c0-.63-.06-1.25-.16-1.84H9v3.47h4.84c-.21 1.12-.84 2.07-1.8 2.71v2.24h2.91c1.71-1.58 2.69-3.91 2.69-6.58z" fill="#4285f4"/><path d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.91-2.24c-.8.54-1.83.86-3.05.86-2.34 0-4.33-1.58-5.04-3.71H.95v2.3C2.43 15.89 5.44 18 9 18z" fill="#34a853"/><path d="M3.96 10.73A5.41 5.41 0 0 1 3.68 9c0-.6.1-1.17.28-1.73V4.97H.95a8.99 8.99 0 0 0 0 8.06l3.01-2.3z" fill="#fbbc05"/><path d="M9 3.58c1.32 0 2.5.45 3.44 1.35l2.58-2.58C13.47.89 11.43 0 9 0 5.44 0 2.43 2.11.95 4.97l3.01 2.3c.71-2.13 2.7-3.71 5.04-3.71z" fill="#ea4335"/></svg>
        Sign in with Google
      </button>
    </div>
    
    <div id="error-msg" class="error-msg"></div>
    
    <div style="margin-top: 16px;">
      <button id="demo-bypass" class="ghost" style="width: 100%; border: 1px dashed rgba(255,255,255,0.2);">Continue in Demo Mode (Bypass Auth)</button>
    </div>
  </div>

  <!-- Firebase SDKs -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    // Firebase Config (Placeholder - will be replaced or injected)
    const firebaseConfig = {
      apiKey: "AIzaSyClCYZnnlzZRZwcqYfurZT6Pa8tRSHfhUs",
      authDomain: "fraud-shield-663a9.firebaseapp.com",
      projectId: "fraud-shield-663a9",
      storageBucket: "fraud-shield-663a9.firebasestorage.app",
      messagingSenderId: "923454719714",
      appId: "1:923454719714:web:6a55b0155ca9eddabdc0bb"
    };

    const loginForm = document.getElementById('login-form');
    const googleBtn = document.getElementById('google-login');
    const demoBtn = document.getElementById('demo-bypass');
    const errorDiv = document.getElementById('error-msg');

    demoBtn.addEventListener('click', () => {
      localStorage.setItem("demo_auth", "true");
      window.location.href = "/";
    });

    if (firebaseConfig.apiKey === "YOUR_API_KEY") {
      // --- DEMO MODE BYPASS ---
      // For the hackathon demo, if no keys are provided, we simulate a login.
      console.warn("Running in DEMO MODE. Firebase Auth bypassed.");
      
      if (localStorage.getItem("demo_auth")) {
        window.location.href = "/";
      }

      loginForm.addEventListener('submit', (e) => {
        e.preventDefault();
        localStorage.setItem("demo_auth", "true");
        window.location.href = "/";
      });

      googleBtn.addEventListener('click', () => {
        localStorage.setItem("demo_auth", "true");
        window.location.href = "/";
      });

    } else {
      // --- REAL FIREBASE MODE ---
      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);

      onAuthStateChanged(auth, (user) => {
        if (user) {
          window.location.href = "/";
        }
      });

      loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        try {
          await signInWithEmailAndPassword(auth, email, password);
          window.location.href = "/";
        } catch (err) {
          errorDiv.textContent = err.message;
          errorDiv.style.display = 'block';
        }
      });

      googleBtn.addEventListener('click', async () => {
        const provider = new GoogleAuthProvider();
        try {
          await signInWithPopup(auth, provider);
          window.location.href = "/";
        } catch (err) {
          errorDiv.textContent = err.message;
          errorDiv.style.display = 'block';
        }
      });
    }
  </script>
</body>
</html>
