<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fraud Shield Profile</title>
  <link rel="stylesheet" href="/static/dashboard.css?v=2" />
  <style>
    .auth-panel {
      max-width: 400px;
      margin: 40px auto;
      padding: 24px;
      background: var(--bg-card);
      border-radius: 12px;
      border: 1px solid var(--border);
    }
    .auth-panel h2 {
      margin-top: 0;
      margin-bottom: 16px;
    }
    .auth-panel input {
      width: 100%;
      padding: 10px;
      margin-bottom: 16px;
      background: var(--bg-main);
      border: 1px solid var(--border);
      color: var(--text-main);
      border-radius: 6px;
      box-sizing: border-box;
    }
    .auth-panel .button-row {
      display: flex;
      gap: 12px;
    }
    .auth-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0 16px;
      color: var(--text-muted, #94a3b8);
      font-size: 13px;
    }
    .auth-divider::before,
    .auth-divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .google-btn {
      width: 100%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 10px 16px;
      background: #fff;
      color: #1f2937;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
    }
    .google-btn:hover {
      background: #f8fafc;
    }
    .profile-info {
      display: none;
      margin-bottom: 24px;
      padding: 16px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
    }
    .profile-info.active {
      display: block;
    }
    .nav-links {
      margin-bottom: 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="hero">
      <div class="nav-links">
        <a href="/dashboard" class="ghost" style="text-decoration: none; padding: 12px 20px; display: inline-flex; align-items: center; justify-content: center; border-radius: 12px; font-weight: 600;">← Back to Dashboard</a>
        <button id="logout-btn" class="ghost" style="display: none;">Logout</button>
      </div>
      <div>
        <p class="eyebrow">User Space</p>
        <h1>Profile & Live Feed</h1>
        <p class="lede">Authenticate to view your details and the real-time transaction monitor.</p>
      </div>
    </header>

    <main class="grid" id="main-content">
      
      <!-- Auth Form -->
      <section class="panel" id="auth-section">
        <div class="auth-panel">
          <h2>Login / Sign Up</h2>
          <form id="auth-form">
            <input type="email" id="email" placeholder="Email Address" required />
            <input type="password" id="password" placeholder="Password" required />
            <div class="button-row">
              <button type="button" id="login-btn" class="primary">Login</button>
              <button type="button" id="signup-btn" class="accent">Sign Up</button>
            </div>
            <div class="auth-divider">or continue with</div>
            <button type="button" id="google-login-btn" class="google-btn">
              <svg width="18" height="18" viewBox="0 0 48 48" aria-hidden="true">
                <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.16 7.09-10.27 7.09-17.65z"/>
                <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
              </svg>
              Continue with Google
            </button>
            <p id="auth-error" style="color: var(--block); margin-top: 12px; font-size: 14px;"></p>
          </form>
        </div>
      </section>

      <!-- Profile & Feed (Hidden until auth) -->
      <div id="authenticated-content" style="display: none; width: 100%;">
        <div class="profile-info active">
          <h2>User Details</h2>
          <p><strong>Email:</strong> <span id="user-email"></span></p>
          <p><strong>UID:</strong> <span id="user-uid"></span></p>
        </div>

        <section class="panel">
          <div class="panel-header">
            <h2>Live Feed</h2>
            <p>Recent decisions visible to operations in real time.</p>
          </div>
          <div id="live-feed" class="live-feed"></div>
        </section>
      </div>

    </main>
  </div>

  <script type="module" src="/static/profile.js?v=9"></script>
</body>
</html>
