services:
  kafka:
    image: apache/kafka:3.8.0
    container_name: fraud-kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    ports:
      - "9092:9092"

  neo4j:
    image: neo4j:5.19
    container_name: fraud-neo4j
    environment:
      NEO4J_AUTH: neo4j/frauddetection123
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j-data:/data

  web-app:
    build: .
    container_name: fraud-web
    depends_on:
      - kafka
      - neo4j
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: frauddetection123
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      USE_NEO4J: "true"
      PYTHONPATH: /app
    volumes:
      - ./data:/app/data
      - ./outputs:/app/outputs
      - ./ml_models:/app/ml_models
    ports:
      - "8000:8000"
    command: ["uvicorn", "api.app:app", "--host", "0.0.0.0", "--port", "8000"]

  mcp-server:
    build: .
    container_name: fraud-mcp
    profiles: ["tools"]
    depends_on:
      - kafka
      - neo4j
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: frauddetection123
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      USE_NEO4J: "true"
      PYTHONPATH: /app
    volumes:
      - ./data:/app/data
      - ./outputs:/app/outputs
      - ./ml_models:/app/ml_models
    command: ["python", "-m", "mcp_server.server"]

volumes:
  neo4j-data:
