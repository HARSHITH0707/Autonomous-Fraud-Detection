services:
  - type: web
    name: fraud-shield-console
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn api.app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: USE_NEO4J
        value: "false"
      - key: BLOCK_THRESHOLD
        value: "0.8"
      - key: OTP_THRESHOLD
        value: "0.55"
      - key: FIREBASE_API_KEY
        sync: false
      - key: FIREBASE_AUTH_DOMAIN
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_STORAGE_BUCKET
        sync: false
      - key: FIREBASE_MESSAGING_SENDER_ID
        sync: false
      - key: FIREBASE_APP_ID
        sync: false
      - key: FIREBASE_MEASUREMENT_ID
        sync: false
